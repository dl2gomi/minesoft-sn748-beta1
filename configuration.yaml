# API settings
api:
  api_title: "3D Generation Pipeline Service"
  host: "0.0.0.0"
  port: 10006
  debug: false
  timeout: 300.0

# Output settings
output:
  save_generated_files: false
  send_generated_files: false
  compression: false
  output_dir: "generated_outputs"


# Trellis model settings
trellis:
  model_id: "microsoft/TRELLIS.2-4B"
  sparse_structure_steps: 16
  sparse_structure_cfg_strength: 6.0
  shape_slat_steps: 8
  shape_slat_cfg_strength: 3.0
  tex_slat_steps: 12
  tex_slat_cfg_strength: 9.5
  pipeline_type: "1024_cascade"  # "512", "1024_cascade"
  mode: "multidiffusion"  # "singleview", "multiview"
  # New multiview behavior:
  # - "off": always single-view (no extra Qwen views)
  # - "always": always multiview (current behavior when multiview=true)
  # - "dynamic": decide per-image using decision module (vLLM)
  multiview_mode: "dynamic"
  num_samples: 2
  gpu: 0

# Qwen model settings
qwen:
  model_id: "Qwen/Qwen-Image-Edit-2511"
  base_model_path: "Qwen-Image-Edit-2511-Lightning-4steps-V1.0-bf16.safetensors"
  lora_path: "lightx2v/Qwen-Image-Edit-2511-Lightning"
  fuse_lightning_lora: true
  # Hugging Face repo for the multiple-angles LoRA (same style as lora_path). Leave empty to disable.
  lora_angles_path: "fal/Qwen-Image-Edit-2511-Multiple-Angles-LoRA"
  lora_angles_filename: "qwen-image-edit-2511-multiple-angles-lora.safetensors"
  lora_angles_weight: 0.6  # fal recommends 0.8-1.0 for angle LoRA
  height: 1024
  width: 1024
  num_inference_steps: 4
  true_cfg_scale: 1.0
  prompt_path_base: "prompts/qwen_edit_prompt_v5.json"
  gpu: 0
  dtype: "bf16"

# Pre-decision (category, multiview, pipeline) via vLLM decision module
clarifier:
  enabled: true
  # If false, ignore category for GLB material mapping (no per-category presets).
  use_category_clarification: false
  # category_config_path: optional path to category_config.yaml; default is pipeline_service/category_config.yaml

# Background removal model settings
background_removal:
  model_type: "birefnet"
  model_id: "ZhengPeng7/BiRefNet"
  input_image_size: [1024, 1024]
  padding_percentage: 0.05
  limit_padding: false
  gpu: 0

# GLB Converter settings
glb_converter:
  decimation_target: 200000
  texture_size: 2048
  # Use BLEND so transparent objects (glass, plastics, bottles) can preserve
  # their alpha. The converter will automatically switch to OPAQUE when the
  # baked alpha channel is fully opaque for a given asset.
  alpha_mode: "BLEND"
  rescale: 1.0
  subdivisions: 1
  vertex_reproject: 0.1
  alpha_gamma: 1.0
  remesh: true
  remesh_band: 1
  remesh_project: 0.1
  mesh_cluster_global_iterations: 2
  mesh_cluster_refine_iterations: 0
  mesh_cluster_smooth_strength: 0.15
  mesh_cluster_threshold_cone_half_angle: 100
  # UV unwrap guards: above trivial_uv_max_* we skip CuMesh; after clustering, if chart count > max_xatlas_charts we skip xatlas (use planar UVs).
  trivial_uv_max_faces: 300000
  trivial_uv_max_vertices: 200000
  max_xatlas_charts: 20000
  # Hard mesh-size guard for GLB export; above these we skip GLB for that candidate altogether.
  max_vertices_for_glb: 2000000
  max_faces_for_glb: 3000000
  smooth_mesh: true
  smooth_iterations: 5
  smooth_lambda: 0.5
  # Optional: make materials less rough (e.g. roughness_scale: 0.7, roughness_bias: 0.1)
  roughness_scale: 0.7
  roughness_bias: 0.1
  # Optional: reduce bright/saturated look (e.g. color_saturation: 0.85, color_brightness: 0.95)
  color_saturation: 0.85
  # color_brightness: 1.0
  gpu: 0
  # Auto-clamp GLB conversion params based on mesh size + free VRAM (safety).
  # Defaults match the previous hardcoded behavior in pipeline.py.
  auto_clamp:
    enabled: true
    large_vertices: 400000
    large_faces: 800000
    very_large_vertices: 1000000
    very_large_faces: 2000000
    low_vram_gb: 10.0
    very_low_vram_gb: 6.0
    large:
      max_decimation_target: 100000
      max_texture_size: 1536
      max_subdivisions: 1
      disable_remesh: false
      disable_remesh_if_low_vram: true
    very_large:
      max_decimation_target: 60000
      max_texture_size: 1024
      max_subdivisions: 0
      disable_remesh: true
      disable_remesh_if_low_vram: true
    oom_retry:
      enabled: true
      max_decimation_target: 70000
      max_texture_size: 1024
      disable_remesh: true
      max_subdivisions: 0

# Judge model settings
judge:
  enabled: true
  vllm_port: 8095
  vllm_model_name: "zai-org/GLM-4.1V-9B-Thinking"
  vllm_revision: "17193d2147da3acd0da358eb251ef862b47e7545"
  vllm_api_key: "local"
  vllm_url: "http://localhost:8095/v1"
  gpu_memory_utilization: 0.175
  max_model_len: 8096
  max_num_seqs: 2
  # If any GLB candidate exceeds this many bytes, skip the judge step and ignore that candidate.
  # Set to 0 or negative to disable this guard. Example: 200MB -> 209715200.
  max_glb_bytes_for_judge: 209715199
  
# Model versions (pinned HuggingFace model revisions)
model_versions:
  models:
    "microsoft/TRELLIS.2-4B": "af44b45f2e35a493886929c6d786e563ec68364d"
    "microsoft/TRELLIS-image-large": "25e0d31ffbebe4b5a97464dd851910efc3002d96"
    "ZhengPeng7/BiRefNet": "26e7919b869d089e5096e898c0492898f935604c"
    "ZhengPeng7/BiRefNet_dynamic": "6b6dad160e17b58bfc476c26e1d13827c910eed6"
    "PramaLLC/BEN2": "e48a20765fb421d19dcdb0bf3cc61e802ca5ec8f"
    "Tooony133/dinov3-vitl16-pretrain-lvd1689m": "7d6ed51c4a5c416d5594d377c8f2b62ac99200b6"
    "Qwen/Qwen-Image-Edit-2511": "6f3ccc0b56e431dc6a0c2b2039706d7d26f22cb9"
