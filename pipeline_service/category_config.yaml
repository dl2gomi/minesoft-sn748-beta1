# Object category config: CLIP prompts for classification and GLB material presets per category.
# Edit this file to add/change categories or presets without changing code.

categories:
  glass:
    - "a clear transparent glass bottle on a plain background"
    - "a glass jar or container made of transparent glass"
    - "a shiny glass cup or drinking glass"
  metal:
    - "a polished shiny metal can on a plain background"
    - "a stainless steel tool or object made of metal"
    - "a chrome metallic product with reflective surface"
  plastic:
    - "a smooth colorful plastic bottle on a plain background"
    - "a plastic container or packaging made of plastic"
    - "a plastic household product with a matte plastic surface"
  organic:
    - "a fabric or plush toy made of soft material"
    - "a soft toy or stuffed animal with fabric texture"
    - "a piece of fruit or food with organic surface"
    - "an object made of wood, fabric, or other organic material"

# GLBConverterParams overrides per category (only material-related keys are typically used).
glb_presets:
  glass:
    roughness_scale: 0.45
    roughness_bias: 0.05
    color_saturation: 0.9
    color_brightness: 1.0
  metal:
    roughness_scale: 0.5
    roughness_bias: 0.08
    color_saturation: 0.9
    color_brightness: 1.0
  plastic:
    roughness_scale: 0.7
    roughness_bias: 0.1
    color_saturation: 0.85
    color_brightness: 1.0
  organic:
    roughness_scale: 0.85
    roughness_bias: 0.12
    color_saturation: 0.9
    color_brightness: 1.0
  generic:
    roughness_scale: 0.7
    roughness_bias: 0.1
    color_saturation: 0.85
    color_brightness: 1.0

category_confidence_threshold: 0.45