# Category config: GLB material presets per category (used by GLB converter).
# Pipeline gets category from the decision module (vLLM); this file maps category name -> GLB params.

# GLBConverterParams overrides per category.
# alpha_mode: OPAQUE = no transparency; BLEND = allow transparency (e.g. glass).
glb_presets:
  glass:
    roughness_scale: 0.35
    roughness_bias: 0.05
    color_saturation: 0.9
    color_brightness: 1.0
    alpha_mode: BLEND  # transparent glass should stay blended
  clearPlastic:
    roughness_scale: 0.45
    roughness_bias: 0.1
    color_saturation: 0.9
    color_brightness: 1.0
    alpha_mode: BLEND  # clear PET-style plastics can be see-through
  metal:
    roughness_scale: 0.55
    roughness_bias: 0.10
    color_saturation: 0.9
    color_brightness: 0.98
    alpha_mode: OPAQUE
  plastic:
    roughness_scale: 0.75
    roughness_bias: 0.12
    color_saturation: 0.9
    color_brightness: 0.98
    alpha_mode: OPAQUE
  organic:
    roughness_scale: 0.90
    roughness_bias: 0.12
    color_saturation: 0.95
    color_brightness: 0.98
    alpha_mode: OPAQUE
  fabric:
    roughness_scale: 0.92
    roughness_bias: 0.15
    color_saturation: 0.95
    color_brightness: 0.96
    alpha_mode: OPAQUE
  wood:
    roughness_scale: 0.85
    roughness_bias: 0.12
    color_saturation: 0.9
    color_brightness: 0.97
    alpha_mode: OPAQUE
  ceramic:
    roughness_scale: 0.60
    roughness_bias: 0.07
    color_saturation: 0.9
    color_brightness: 0.98
    alpha_mode: OPAQUE
  mixed:
    roughness_scale: 0.60
    roughness_bias: 0.10
    color_saturation: 0.9
    color_brightness: 0.98
    alpha_mode: BLEND
  generic:
    roughness_scale: 0.75
    roughness_bias: 0.10
    color_saturation: 0.9
    color_brightness: 0.98
    alpha_mode: OPAQUE

